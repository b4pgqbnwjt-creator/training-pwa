<!DOCTYPE html>
<html>
<head><title>Icon Generator</title></head>
<body>
<canvas id="c192" width="192" height="192" style="display:none"></canvas>
<canvas id="c512" width="512" height="512" style="display:none"></canvas>
<canvas id="c180" width="180" height="180" style="display:none"></canvas>
<script>
function drawIcon(canvas) {
  const s = canvas.width;
  const ctx = canvas.getContext('2d');
  const r = s * 0.18;
  // Background
  ctx.fillStyle = '#0a0a0f';
  roundRect(ctx, 0, 0, s, s, r);
  ctx.fill();
  // Accent ring
  ctx.strokeStyle = '#e8ff3c';
  ctx.lineWidth = s * 0.03;
  roundRect(ctx, s*0.06, s*0.06, s*0.88, s*0.88, r * 0.8);
  ctx.stroke();
  // Running figure emoji
  ctx.font = `${s * 0.52}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🏃', s/2, s/2 + s*0.02);
  // "RIR" text
  ctx.font = `bold ${s * 0.11}px -apple-system,sans-serif`;
  ctx.fillStyle = '#e8ff3c';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'bottom';
  ctx.fillText('RED ISLE', s/2, s * 0.94);
}
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}
['c192','c512','c180'].forEach(id => drawIcon(document.getElementById(id)));
// Download all
['c192','c512','c180'].forEach(id => {
  const c = document.getElementById(id);
  const a = document.createElement('a');
  a.download = id === 'c192' ? 'icon-192.png' : id === 'c512' ? 'icon-512.png' : 'icon-apple.png';
  a.href = c.toDataURL('image/png');
  document.body.appendChild(a);
  a.click();
});
</script>
</body>
</html>
